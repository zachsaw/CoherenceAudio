services:
  jekyll:
    platform: linux/amd64
    image: jekyll/jekyll:pages
    volumes:
      - .:/srv/jekyll
    environment:
      - PAGES_REPO_NWO=test/test
    ports:
      - "4000:4000"
    # This installs webrick then starts the server
    command: >
      bash -c "gem install webrick && jekyll serve --watch --host 0.0.0.0"

