<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} – Coherence Audio{% else %}Coherence Audio{% endif %}</title>
  <link rel="icon" href="{{ '/favicon.ico' | relative_url }}" />
  <style>
    /* ------------------------------------------------------------------ */
    /*  Colour tokens  (matched to Coherence Audio Settings window)        */
    /* ------------------------------------------------------------------ */
    :root {
      --bg-app:       #1a1a1a;   /* outermost window background           */
      --bg-panel:     #242424;   /* dialog / side-panel background        */
      --bg-card:      #2d2d2d;   /* raised card / section background      */
      --bg-input:     #323232;   /* text-input / dropdown background      */
      --border:       #3c3c3c;   /* subtle divider lines                  */
      --border-card:  #404040;   /* card outline                          */
      --text-primary: #f0f0f0;   /* white-ish headings                    */
      --text-body:    #cccccc;   /* body / label text                     */
      --text-muted:   #888888;   /* de-emphasised / placeholder text      */
      --accent:       #00d4d4;   /* cyan checkbox / link highlight        */
      --accent-hover: #00ffff;
      --scrollbar-track: #1e1e1e;
      --scrollbar-thumb: #4a4a4a;
      --radius-card:  8px;
      --radius-btn:   4px;
    }

    /* ------------------------------------------------------------------ */
    /*  Reset & base                                                        */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.65;
      color: var(--text-body);
      background-color: var(--bg-app);
      min-height: 100vh;
    }

    /* ------------------------------------------------------------------ */
    /*  Scrollbar (Chromium)                                                */
    /* ------------------------------------------------------------------ */
    ::-webkit-scrollbar              { width: 8px; }
    ::-webkit-scrollbar-track        { background: var(--scrollbar-track); }
    ::-webkit-scrollbar-thumb        { background: var(--scrollbar-thumb); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover  { background: #666; }

    /* ------------------------------------------------------------------ */
    /*  Site header                                                         */
    /* ------------------------------------------------------------------ */
    .site-header {
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      height: 48px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .site-header .brand {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      text-decoration: none;
      letter-spacing: 0.02em;
    }

    .site-header .brand:hover { color: var(--accent); }

    /* ------------------------------------------------------------------ */
    /*  Page layout                                                         */
    /* ------------------------------------------------------------------ */
    .page-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ------------------------------------------------------------------ */
    /*  Content card (matches the Settings dialog panel)                    */
    /* ------------------------------------------------------------------ */
    .content-card {
      background: var(--bg-panel);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-card);
      padding: 36px 40px;
    }

    /* ------------------------------------------------------------------ */
    /*  Markdown content styles                                             */
    /* ------------------------------------------------------------------ */

    /* Headings */
    .md-content h1,
    .md-content h2,
    .md-content h3,
    .md-content h4,
    .md-content h5,
    .md-content h6 {
      color: var(--text-primary);
      font-weight: 600;
      margin-top: 2em;
      margin-bottom: 0.5em;
      line-height: 1.3;
    }

    .md-content h1 { font-size: 1.75rem; margin-top: 0; }
    .md-content h2 { font-size: 1.3rem;  border-bottom: 1px solid var(--border); padding-bottom: 0.35em; margin-top: 2.2em; }
    .md-content h3 { font-size: 1.1rem; }
    .md-content h4 { font-size: 1rem; }

    /* Paragraphs */
    .md-content p { margin-bottom: 1em; }

    /* Links */
    .md-content a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .md-content a:hover {
      color: var(--accent-hover);
      border-bottom-color: var(--accent-hover);
    }

    /* Horizontal rule */
    .md-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2em 0;
    }

    /* Bold / italic */
    .md-content strong { color: var(--text-primary); font-weight: 600; }
    .md-content em     { font-style: italic; }

    /* Lists */
    .md-content ul,
    .md-content ol {
      padding-left: 1.6em;
      margin-bottom: 1em;
    }
    .md-content li { margin-bottom: 0.3em; }

    /* Inline code */
    .md-content code {
      font-family: "Cascadia Code", "Consolas", "Courier New", monospace;
      font-size: 0.88em;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.15em 0.45em;
      color: var(--accent);
    }

    /* Code blocks */
    .md-content pre {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-card);
      padding: 16px 20px;
      overflow-x: auto;
      margin-bottom: 1.2em;
    }
    .md-content pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 0.875rem;
      color: var(--text-body);
    }

    /* Block-quotes */
    .md-content blockquote {
      border-left: 3px solid var(--accent);
      padding: 0.4em 1em;
      margin: 1em 0;
      color: var(--text-muted);
      background: var(--bg-card);
      border-radius: 0 var(--radius-btn) var(--radius-btn) 0;
    }

    /* Images */
    .md-content img {
      max-width: 100%;
      border-radius: var(--radius-card);
      border: 1px solid var(--border-card);
      display: block;
      margin: 1.2em auto;
    }

    /* Tables — mirroring the Settings window's clean rows */
    .md-content table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.4em;
      font-size: 0.92em;
    }
    .md-content thead tr {
      background: var(--bg-card);
    }
    .md-content th {
      text-align: left;
      padding: 8px 12px;
      color: var(--text-primary);
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }
    .md-content td {
      padding: 7px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    .md-content tbody tr:last-child td { border-bottom: none; }
    .md-content tbody tr:hover        { background: var(--bg-card); }

    /* ------------------------------------------------------------------ */
    /*  Footer                                                              */
    /* ------------------------------------------------------------------ */
    .site-footer {
      text-align: center;
      padding: 24px;
      font-size: 0.82em;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      margin-top: 60px;
    }

    /* ------------------------------------------------------------------ */
    /*  Responsive                                                          */
    /* ------------------------------------------------------------------ */
    @media (max-width: 640px) {
      .page-wrapper     { padding: 20px 14px 60px; }
      .content-card     { padding: 24px 18px; }
      .md-content h1    { font-size: 1.4rem; }
      .md-content h2    { font-size: 1.15rem; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <a class="brand" href="{{ '/' | relative_url }}">Coherence Audio</a>
  </header>

  <main class="page-wrapper">
    <div class="content-card">
      <article class="md-content">
        {{ content }}
      </article>
    </div>
  </main>

  <footer class="site-footer">
    &copy; {{ site.time | date: "%Y" }} Coherence Audio
  </footer>

</body>
</html>
