---
layout: base
---
<style>
  ::-webkit-scrollbar { display: none; }
  
  /* Added a subtle background grid pattern */
  .scroll-container {
    height: calc(100dvh - var(--header-height));
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    scroll-behavior: smooth;
    background-color: var(--bg-app);
    background-image: 
      linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    background-position: center center;
  }

  .section {
    height: calc(100dvh - var(--header-height));
    scroll-snap-align: start;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    padding: 20px; text-align: center; position: relative;
    opacity: 0; transform: translateY(30px);
    transition: opacity 0.8s ease-out, transform 0.8s ease-out;
    overflow: hidden;
  }

  .section.is-visible { opacity: 1; transform: translateY(0); }

  /* Gradient Text for Headlines */
  .hero-title { 
    font-size: 3.5rem; 
    font-weight: 800; 
    margin-bottom: 16px; 
    line-height: 1.1; 
    background: linear-gradient(135deg, #ffffff 0%, #888888 100%);
    -webkit-background-clip: text;
    background-clip: text; /* <-- Added standard property */
    -webkit-text-fill-color: transparent;
  }
  .hero-subtitle { font-size: 1.2rem; max-width: 650px; margin-bottom: 32px; color: var(--text-body); }
  
  /* Hero Image Styling */
  .hero-image-wrapper {
    margin-top: 40px;
    max-width: 900px;
    width: 100%;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px var(--border-card);
    position: relative;
    /* Prevents the image from making the section taller than the screen */
    max-height: 35vh; 
    overflow: hidden;
  }
  .hero-image-wrapper img {
    width: 100%;
    display: block;
    object-fit: cover;
    object-position: top;
  }
  /* Fades out the bottom of the image so it blends into the background */
  .hero-image-wrapper::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 100px;
    background: linear-gradient(to bottom, transparent, var(--bg-app));
  }

  /* Split Feature Layout */
  .feature-split {
    display: flex; align-items: center; gap: 60px; max-width: 1000px; width: 100%; text-align: left;
  }
  .feature-text { flex: 1; }
  .feature-image { flex: 1; border-radius: 8px; border: 1px solid var(--border-card); box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; }
  .feature-image img { width: 100%; display: block; }

  /* Pricing Cards */
  .comparison-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; max-width: 800px; width: 100%; text-align: left; }
  .card { background: var(--bg-panel); border: 1px solid var(--border-card); border-radius: var(--radius-card); padding: 32px; position: relative; }
  .card h3 { color: var(--text-primary); margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  .card ul { list-style: none; margin-bottom: 16px; padding: 0; }
  .card li { display: flex; justify-content: space-between; margin-bottom: 8px; color: var(--text-body); }
  .total-row { font-weight: bold; color: var(--text-primary); border-top: 1px solid var(--border); padding-top: 12px; margin-top: 12px; font-size: 1.1rem; }
  
  /* Glowing Pro Card */
  .card.pro-card {
    border-color: var(--accent);
    box-shadow: 0 0 30px rgba(0, 212, 212, 0.1);
    overflow: hidden;
  }
  .card.pro-card h3 { color: var(--accent); border-bottom-color: rgba(0, 212, 212, 0.3); }
  .card.pro-card .total-row { color: var(--accent); border-top-color: rgba(0, 212, 212, 0.3); }
  .badge {
    position: absolute; top: 16px; right: -32px; background: var(--accent); color: #000;
    font-size: 0.7rem; font-weight: 800; padding: 4px 40px; transform: rotate(45deg); letter-spacing: 1px;
  }

  .down-arrow {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
    width: 40px; height: 40px; border-radius: 50%; background: var(--bg-panel);
    border: 1px solid var(--border); color: var(--text-primary);
    display: flex; justify-content: center; align-items: center;
    cursor: pointer; animation: bounce 2s infinite; text-decoration: none; z-index: 10;
  }
  .down-arrow:hover { background: var(--bg-card); color: var(--accent); border-color: var(--accent); }

  @keyframes bounce {
    0%, 20%, 50%, 80%, 100% { transform: translate(-50%, 0); }
    40% { transform: translate(-50%, -10px); }
    60% { transform: translate(-50%, -5px); }
  }

  @media (max-width: 768px) {
    .hero-title { font-size: 2.2rem; }
    .feature-split { flex-direction: column; gap: 30px; text-align: center; }
    .comparison-grid { grid-template-columns: 1fr; gap: 20px; }
    .hero-image-wrapper { max-height: 25vh; }
  }
</style>

<div class="scroll-container" id="scroller">
  {{ content }}
</div>

<script>
  const sections = document.querySelectorAll('.section');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('is-visible');
      }
    });
  }, { threshold: 0.4 });

  sections.forEach(section => observer.observe(section));

  function scrollToNext(index) {
    const nextSection = sections[index + 1];
    if (nextSection) {
      nextSection.scrollIntoView({ behavior: 'smooth' });
    }
  }
</script>
